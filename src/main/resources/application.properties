spring.application.name=forohub
# Configuraciµn de la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/forohub
spring.datasource.username=${SQL_USER}
spring.datasource.password=${SQL_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraciµn de JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false


# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Configuraciµn del servidor (opcional)
server.port=8080


api.security.secret=mi_clave_secreta_forohub

# Nueva configuraciµn por undefined unknown
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000